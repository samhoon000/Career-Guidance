version: "3.8"
services:
  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "5001:5001"
    depends_on:
      - mongo
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
volumes:
  mongo-data:
