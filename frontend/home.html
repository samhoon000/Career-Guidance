<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        #userBox {
            position: absolute;
            top: 15px;
            right: 20px;
            padding: 10px 15px;
            background: #3b82f6;
            color: white;
            border-radius: 6px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="userBox">Loading...</div>

<h1>Welcome to Career Guidance App</h1>
<!-- Your roadmap buttons here -->

<script>
    const username = localStorage.getItem("username");

    if (!username) {
        document.getElementById("userBox").innerText = "Guest";
    } else {
        document.getElementById("userBox").innerText = username;
    }
</script>

</body>
</html>
